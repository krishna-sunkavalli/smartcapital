# Human-Approved AI Investment System v2 - runtime configuration.
# All limits here are DETERMINISTIC guardrails. The LLM cannot override any of them.

rollout:
  # 1 = paper trading, 2 = live with training-wheel limits, 3 = full configured limits.
  # Promotion between phases is manual and gated by evaluation/rollout.py criteria.
  phase: 1
  phase2_max_order_notional: 500.0     # fixed small order size in phase 2
  phase2_max_daily_approvals: 2

universe:
  sp500_only: true
  # Local cached constituent list (refreshed from the fundamentals provider).
  constituents_cache_days: 7
  long_only: true                      # no margin, shorting, or options execution

exposure:
  max_position_pct: 0.10               # max position size per name, fraction of managed capital
  max_sector_pct: 0.30                 # max sector exposure (GICS sector from fundamentals feed)
  max_correlated_tech_pct: 0.45        # extra ceiling across info-tech + comm-services + cons-discretionary mega-caps
  managed_capital_pct: 0.20            # hard ceiling on system-managed capital as fraction of account equity
  max_daily_deployment: 2000.0         # USD
  max_weekly_deployment: 6000.0        # USD
  min_cash_buffer: 500.0               # available-cash verification floor

orders:
  limit_only: true                     # market orders prohibited
  price_band_pct: 0.01                 # limit band around analysis reference price (+/- 1%)
  auction_buffer_minutes: 10           # no orders within N minutes of open/close auctions
  order_time_in_force: day

triggers:
  poll_interval_minutes: 15
  cooldown_days_per_symbol_trigger: 5  # an EMA cross fires once, not every polling cycle
  earnings_blackout_trading_days: 5    # no new BUY proposals within N trading days before earnings
  weekly_review_day: friday            # scheduled review of every open position
  drawdown_review_pct: 0.12            # position drawdown beyond threshold triggers review
  concentration_review_pct: 0.12       # position grown past this share of managed capital triggers review
  buy:
    ema200_proximity_pct: 0.02         # price within 2% of EMA-200 (or crossing)
    ema_fast: 20
    ema_slow: 50
    rsi_oversold: 32
    pullback_pct: 0.07                 # significant pullback from 20d high
    pullback_volume_mult: 1.5          # with volume confirmation vs 20d average

analyst:
  model: claude-sonnet-5               # pinned; recorded with every analysis
  prompt_version: "2.0.0"              # recorded with every analysis
  temperature: 0.0
  samples: 1                           # set to 3 for majority-vote mode
  max_tokens: 2000
  buy_rate_alert_threshold: 0.35       # if Buy share of rolling analyses exceeds this, flag prompt review
  buy_rate_window: 50                  # rolling window of analyses for the base-rate monitor

freshness:
  # Analysis is REJECTED if any required field is missing or older than these thresholds.
  market_price_seconds: 900
  market_daily_bars_hours: 30
  fundamentals_days: 7
  earnings_calendar_days: 2
  feed_disagreement_pct: 0.03          # halt if price feeds disagree by more than this

approval:
  ttl_minutes: 60                      # proposal expires; expiry or rejection causes no action
  daily_approval_cap: 3
  min_read_delay_seconds: 45           # buttons inactive until N seconds after delivery
  typeback_notional_threshold: 1000.0  # orders above this require typing the ticker back
  weekly_digest_day: sunday
  approval_rate_alarm: 0.90            # near-100% approval rate => the human gate has stopped functioning

safety:
  max_proposals_per_rolling_hour: 4    # automatic anomaly halt above this
  max_proposals_per_rolling_day: 8
